version: "3.8"

services:
  nexus:
    build: .
    container_name: nexus-command-center
    ports:
      - "8080:8080"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./data:/usr/share/nginx/html/data:ro
      - nexus-data:/usr/share/nginx/html/persist
    restart: unless-stopped

volumes:
  nexus-data:
