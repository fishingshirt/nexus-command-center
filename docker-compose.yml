services:
  nexus:
    build: .
    container_name: nexus-command-center
    ports:
      - "8080:8080"
    volumes:
      - ./public:/usr/share/nginx/html
      - nexus-data:/usr/share/nginx/html/persist
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  nexus-data:
